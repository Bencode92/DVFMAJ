<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DVF — Upload Data</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0e1a; color: #e0e0e0; min-height: 100vh; padding: 2rem; }
    h1 { text-align: center; margin-bottom: .5rem; color: #00d4aa; }
    .subtitle { text-align: center; color: #888; margin-bottom: 2rem; font-size: .9rem; }
    nav { text-align: center; margin-bottom: 2rem; }
    nav a { color: #00d4aa; text-decoration: none; margin: 0 1rem; font-size: .9rem; }
    nav a:hover { text-decoration: underline; }

    .drop-zone {
      max-width: 600px; margin: 0 auto 1.5rem; border: 2px dashed #2a3050; border-radius: 12px;
      padding: 3rem 2rem; text-align: center; cursor: pointer; transition: all .2s;
    }
    .drop-zone:hover, .drop-zone.dragover { border-color: #00d4aa; background: rgba(0,212,170,.05); }
    .drop-zone p { color: #888; margin-bottom: .5rem; }
    .drop-zone .hint { font-size: .8rem; color: #555; }
    .drop-zone .accepted { font-size: .75rem; color: #00d4aa; margin-top: .5rem; }

    .alert { max-width: 600px; margin: 0 auto 1rem; padding: .75rem 1rem; border-radius: 8px; font-size: .85rem; display: none; }
    .alert.error { background: rgba(255,68,68,.1); border: 1px solid #ff4444; color: #ff6666; display: block; }
    .alert.warn { background: rgba(255,170,0,.1); border: 1px solid #ffaa00; color: #ffcc44; display: block; }

    .file-list { max-width: 600px; margin: 0 auto 1.5rem; }
    .file-item {
      display: flex; align-items: center; justify-content: space-between;
      background: #161b2e; border: 1px solid #2a3050; border-radius: 8px;
      padding: .6rem 1rem; margin-bottom: .5rem; font-size: .85rem;
    }
    .file-item .name { flex: 1; }
    .file-item .size { color: #888; margin: 0 1rem; }
    .file-item .tag { font-size: .7rem; padding: .15rem .4rem; border-radius: 4px; margin-right: .5rem; }
    .file-item .tag.new { background: #00d4aa22; color: #00d4aa; }
    .file-item .tag.update { background: #ffaa0022; color: #ffaa00; }
    .file-item .status { width: 80px; text-align: right; }
    .file-item .status.ok { color: #00d4aa; }
    .file-item .status.err { color: #ff4444; }
    .file-item .status.wait { color: #888; }
    .file-item .status.uploading { color: #ffaa00; }
    .file-item .remove { cursor: pointer; color: #ff4444; margin-left: .5rem; font-size: 1.1rem; }

    .actions { max-width: 600px; margin: 0 auto; display: flex; gap: 1rem; }
    .btn {
      flex: 1; padding: .75rem; border: none; border-radius: 8px; font-size: .9rem;
      cursor: pointer; font-weight: 600; transition: all .2s;
    }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-push { background: #00d4aa; color: #0a0e1a; }
    .btn-push:hover:not(:disabled) { background: #00f0c0; }
    .btn-clear { background: #2a3050; color: #e0e0e0; }
    .btn-clear:hover:not(:disabled) { background: #3a4060; }

    .log { max-width: 600px; margin: 1.5rem auto 0; background: #0d1117; border: 1px solid #2a3050; border-radius: 8px; padding: 1rem; font-family: monospace; font-size: .8rem; max-height: 200px; overflow-y: auto; }
    .log .line { margin-bottom: .25rem; }
    .log .line.ok { color: #00d4aa; }
    .log .line.err { color: #ff4444; }
    .log .line.info { color: #888; }
  </style>
</head>
<body>
  <h1>DVF Upload</h1>
  <p class="subtitle">Glisser les CSV pour les pousser sur GitHub</p>
  <nav><a href="dashboard.html">Dashboard</a></nav>

  <div class="alert" id="alert"></div>

  <div class="drop-zone" id="dropZone">
    <p>Glisser-deposer vos fichiers CSV ici</p>
    <p class="hint">ou cliquer pour selectionner</p>
    <p class="accepted">Formats acceptes : Capital_XX.csv, loyer_1ou2p.csv, loyer_3p.csv</p>
    <input type="file" id="fileInput" multiple accept=".csv" style="display:none" />
  </div>

  <div class="file-list" id="fileList"></div>

  <div class="actions">
    <button class="btn btn-clear" id="btnClear" disabled>Vider</button>
    <button class="btn btn-push" id="btnPush" disabled>Push sur GitHub</button>
  </div>

  <div class="log" id="log" style="display:none"></div>

  <script>
    // ===== CONFIGURATION =====
    // TODO: remplacer par ton URL Worker Cloudflare
    const WORKER_URL = "https://studyforge-proxy.benoit-comas.workers.dev";
    const REPO = "Bencode92/DVFMAJ";
    const BRANCH = "main";
    const DATA_PATH = "data";

    // Patterns de fichiers acceptes
    const VALID_PATTERNS = [
      /^Capital_\d{2,3}[A-B]?\.csv$/i,   // Capital_92.csv, Capital_2A.csv, Capital_75.csv
      /^loyer_1ou2p\.csv$/i,              // loyer_1ou2p.csv
      /^loyer_3p\.csv$/i,                 // loyer_3p.csv
    ];

    function isValidFileName(name) {
      return VALID_PATTERNS.some(p => p.test(name));
    }

    let files = new Map(); // name -> { file, status, isUpdate }
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");
    const fileList = document.getElementById("fileList");
    const btnPush = document.getElementById("btnPush");
    const btnClear = document.getElementById("btnClear");
    const logEl = document.getElementById("log");
    const alertEl = document.getElementById("alert");

    // Drop zone events
    dropZone.addEventListener("click", () => fileInput.click());
    dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("dragover"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
    dropZone.addEventListener("drop", e => {
      e.preventDefault();
      dropZone.classList.remove("dragover");
      addFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener("change", () => { addFiles(fileInput.files); fileInput.value = ""; });

    function showAlert(msg, type) {
      alertEl.className = "alert " + type;
      alertEl.textContent = msg;
      setTimeout(() => { alertEl.className = "alert"; }, 5000);
    }

    function addFiles(fileListInput) {
      let rejected = [];
      for (const f of fileListInput) {
        if (!f.name.endsWith(".csv")) {
          rejected.push(f.name + " (pas un CSV)");
          continue;
        }
        if (!isValidFileName(f.name)) {
          rejected.push(f.name);
          continue;
        }
        // Si doublon dans la selection, on remplace
        files.set(f.name, { file: f, status: "wait", isUpdate: false });
      }
      if (rejected.length > 0) {
        showAlert(
          "Fichiers refuses (format attendu: Capital_XX.csv ou loyer_*.csv) : " + rejected.join(", "),
          "error"
        );
      }
      renderFiles();
    }

    function renderFiles() {
      fileList.innerHTML = "";
      for (const [name, data] of files) {
        const sizeMB = (data.file.size / 1024 / 1024).toFixed(1);
        const statusLabel = { wait: "En attente", uploading: "Upload...", ok: "OK", err: "Erreur" }[data.status];
        const tag = data.isUpdate
          ? '<span class="tag update">MAJ</span>'
          : '<span class="tag new">Nouveau</span>';
        fileList.innerHTML += `
          <div class="file-item">
            <span class="name">${tag}${name}</span>
            <span class="size">${sizeMB} Mo</span>
            <span class="status ${data.status}">${statusLabel}</span>
            <span class="remove" onclick="removeFile('${name}')">&times;</span>
          </div>`;
      }
      btnPush.disabled = files.size === 0;
      btnClear.disabled = files.size === 0;
    }

    window.removeFile = (name) => { files.delete(name); renderFiles(); };
    btnClear.addEventListener("click", () => { files.clear(); alertEl.className = "alert"; renderFiles(); });

    // ===== Pre-check: fichier existe deja sur GitHub ? =====
    async function checkExisting() {
      for (const [name, data] of files) {
        if (data.status !== "wait") continue;
        try {
          const checkUrl = `${WORKER_URL}/github/${REPO}/contents/${DATA_PATH}/${name}?ref=${BRANCH}`;
          const resp = await fetch(checkUrl);
          if (resp.ok) {
            const json = await resp.json();
            data.sha = json.sha;
            data.isUpdate = true;
          }
        } catch (e) { /* new file */ }
      }
      renderFiles();
    }

    // ===== Push to GitHub =====
    btnPush.addEventListener("click", async () => {
      btnPush.disabled = true;
      logEl.style.display = "block";
      logEl.innerHTML = "";
      log("Verification des fichiers existants...", "info");

      await checkExisting();

      let success = 0, errors = 0;

      for (const [name, data] of files) {
        if (data.status === "ok") { success++; continue; }

        data.status = "uploading";
        renderFiles();

        try {
          log(`${name}: lecture + encodage base64...`, "info");
          const content = await readFileAsBase64(data.file);

          const putUrl = `${WORKER_URL}/github/${REPO}/contents/${DATA_PATH}/${name}`;
          const body = {
            message: data.isUpdate ? `data: update ${name}` : `data: add ${name}`,
            content: content,
            branch: BRANCH,
          };
          if (data.sha) body.sha = data.sha;

          log(`${name}: push vers GitHub${data.isUpdate ? " (remplacement)" : ""}...`, "info");
          const putResp = await fetch(putUrl, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });

          if (putResp.ok) {
            data.status = "ok";
            success++;
            log(`${name}: OK`, "ok");
          } else {
            const errData = await putResp.json().catch(() => ({}));
            throw new Error(errData.message || `HTTP ${putResp.status}`);
          }
        } catch (e) {
          data.status = "err";
          errors++;
          log(`${name}: ERREUR - ${e.message}`, "err");
        }
        renderFiles();
      }

      log(`Termine: ${success} OK, ${errors} erreurs`, success > 0 && errors === 0 ? "ok" : "err");
      btnPush.disabled = false;
    });

    function readFileAsBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function log(msg, cls) {
      logEl.innerHTML += `<div class="line ${cls}">${new Date().toLocaleTimeString()} - ${msg}</div>`;
      logEl.scrollTop = logEl.scrollHeight;
    }
  </script>
</body>
</html>
